name: Deploy website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/website/**'
      - 'apps/docs/**'
      - 'packages/**'
      - 'docs/adr/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # for "Last updated" timestamps

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # apps/docs imports the dist/ outputs of these workspace packages;
      # without this step astro check fails to resolve them. apps/website
      # uses TypeDoc against source so it doesn't need the same priming.
      - name: Build workspace deps for the docs app
        run: pnpm --filter="@lernkit/components" --filter="@lernkit/tracker" --filter="@lernkit/packagers" build

      # Flavor 2 first: produce the SCORM 1.2 SCO with bundled Pyodide so
      # runnable cells work offline, then unzip it next to the mock-LMS
      # wrapper. The SCORM build needs root-relative URLs (LERNKIT_BASE
      # unset), so it must run before the GH Pages variant clobbers dist/.
      - name: Build SCORM 1.2 package for mock-LMS demo
        run: pnpm --filter=@lernkit/docs build:scorm12:rf-training:with-runtime

      - name: Unzip SCO into website's static dir
        run: |
          mkdir -p apps/website/static/training-lms-demo/sco
          unzip -o -q apps/docs/dist-packages/scorm12/rf-training-*-scorm12.zip \
            -d apps/website/static/training-lms-demo/sco

      # Flavor 1: rebuild the course with depth-prefixed URLs so it can be
      # browsed at /lernkit/training/ (no LMS chrome).
      - name: Build training course (GH Pages variant)
        run: pnpm --filter=@lernkit/docs build:gh-pages

      - name: Copy training course into website's static dir
        run: |
          mkdir -p apps/website/static/training
          cp -r apps/docs/dist/. apps/website/static/training/

      - name: Build website
        run: pnpm --filter=@lernkit/website build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/website/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
