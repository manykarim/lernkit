version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development
      production:
        dependency-type: production
        update-types:
          - patch
          - minor
    ignore:
      # Astro majors require a manual migration pass — opt back in by hand.
      - dependency-name: "astro"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: pip
    directory: "/apps/api"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: "/infra/docker"
    schedule:
      interval: weekly
    groups:
      docker:
        patterns: ["*"]
    ignore:
      # Stay on Node LTS — major bumps land manually.
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
