name: Bug report
description: Report a problem with Lernkit.
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. If this is a security issue, please use GitHub's
        private vulnerability reporting flow instead (see `SECURITY.md`).
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the observed vs. expected behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Lernkit version / commit SHA
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: "e.g. Node 22.11.0, pnpm 9.15.0, macOS 14.4 / Ubuntu 24.04"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      render: shell
