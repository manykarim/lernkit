server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Astro produces files with content-hashed names; long cache for assets.
    location ~* \.(?:js|css|woff2|ttf|eot|svg|png|jpg|jpeg|gif|webp|avif|ico|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML: short cache, always revalidate.
    location / {
        add_header Cache-Control "public, max-age=0, must-revalidate";
        try_files $uri $uri/ $uri/index.html /index.html;
    }

    # Security headers (Phase 0 baseline; CSP tightens in Phase 3 when runnable code ships).
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}
